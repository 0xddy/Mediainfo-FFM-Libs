name: MediaInfo Binaries

# 自源码编译 MediaInfoLib + ZenLib，剔除 JNI 桥（MediaInfoJNI.cpp）与 libcurl/libmms，
# 产物为纯净的 libmediainfo.so.0 + MediaInfo.dll，发布到本仓库 GitHub Release。
# 消费侧由 gradle/mediainfo-binaries.lock + FetchMediaInfoBinariesTask 按 URL+SHA-256 拉取。

on:
  workflow_dispatch:
    inputs:
      mediainfo_tag:
        description: "MediaInfoLib upstream tag (e.g. v26.01)"
        required: true
        default: "v26.01"
      zenlib_tag:
        description: "ZenLib upstream tag (e.g. v0.4.41)"
        required: true
        default: "v0.4.41"
      release_tag:
        description: "Release tag for produced binaries (e.g. mediainfo-vendored-26.01.0)"
        required: true
        default: "mediainfo-vendored-26.01.0"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config build-essential zlib1g-dev binutils file

      - name: Clone upstream sources
        env:
          MEDIAINFO_TAG: ${{ inputs.mediainfo_tag }}
          ZENLIB_TAG: ${{ inputs.zenlib_tag }}
        run: |
          set -euo pipefail
          BUILD_DIR="$RUNNER_TEMP/mediainfo-build"
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"
          git clone --depth=1 --branch "$ZENLIB_TAG" https://github.com/MediaArea/ZenLib
          git clone --depth=1 --branch "$MEDIAINFO_TAG" https://github.com/MediaArea/MediaInfoLib

      - name: Strip JNI bridge from MediaInfoLib source
        run: |
          set -euo pipefail
          BUILD_DIR="$RUNNER_TEMP/mediainfo-build"
          JNI_CPP="$BUILD_DIR/MediaInfoLib/Source/MediaInfoDLL/MediaInfoJNI.cpp"
          test -f "$JNI_CPP" || (echo "Expected JNI source not found: $JNI_CPP"; exit 1)
          : > "$JNI_CPP"
          test ! -s "$JNI_CPP"
          echo "Blanked: $JNI_CPP"

      - name: Build ZenLib (static)
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mediainfo-build/ZenLib/Project/GNU/Library"
          if [ -x ./autogen.sh ]; then ./autogen.sh; else autoreconf -fi; fi
          ./configure --enable-static --disable-shared
          make -j"$(nproc)"

      - name: Build MediaInfoLib (shared, no libcurl/libmms)
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/mediainfo-build/MediaInfoLib/Project/GNU/Library"
          if [ -x ./autogen.sh ]; then ./autogen.sh; else autoreconf -fi; fi
          ./configure \
            --enable-shared \
            --enable-staticlibs \
            --without-libcurl \
            --without-libmms
          make -j"$(nproc)"

      - name: Verify ZenLib statically absorbed (pre-strip)
        run: |
          set -euo pipefail
          # Run on the unstripped artifact: --strip-unneeded later removes the .symtab
          # entries we use to detect the libtool regression below; only the export
          # table (.dynsym) and DT_NEEDED survive stripping.
          SRC="$RUNNER_TEMP/mediainfo-build/MediaInfoLib/Project/GNU/Library/.libs/libmediainfo.so.0"
          test -f "$SRC" || { echo "missing $SRC"; ls -la "$(dirname "$SRC")" || true; exit 1; }

          # (1) Single-file artifact contract: no runtime dependency on libzen.so.*.
          # If this fires, configure picked the dynamic ZenLib branch and we silently
          # broke the lock contract (consumers expect one DLL/.so per platform).
          if readelf -d "$SRC" | grep -E '\(NEEDED\)' | grep -qi libzen ; then
            echo "ERROR: libmediainfo.so.0 has external libzen.so dependency"
            readelf -d "$SRC" | grep -E '\(NEEDED\)'
            exit 1
          fi

          # (2) Regression guard for the libtool static-absorption bug we just fixed:
          # ZenLib symbols must be defined inside libmediainfo.so.0. If libtool ever
          # silently drops the convenience archive again (e.g. upstream resets
          # installed=yes), this fails fast in CI instead of crashing at runtime with
          # "undefined symbol: ZenLib::...".
          if ! nm -C --defined-only "$SRC" | grep -qE 'ZenLib::(Ztring|CriticalSection)' ; then
            echo "ERROR: ZenLib symbols not absorbed into libmediainfo.so.0"
            echo "----- ZenLib symbols seen by nm -C (defined or not): -----"
            nm -C "$SRC" | grep -E 'ZenLib::' | head -20 || true
            exit 1
          fi
          echo "OK: ZenLib statically absorbed; no external libzen.so.* dependency"

      - name: Strip and stage binary
        run: |
          set -euo pipefail
          LIBS_DIR="$RUNNER_TEMP/mediainfo-build/MediaInfoLib/Project/GNU/Library/.libs"
          SRC="$LIBS_DIR/libmediainfo.so.0"
          if [ ! -f "$SRC" ]; then
            echo "Build artifact missing: $SRC"
            ls -la "$LIBS_DIR" || true
            exit 1
          fi
          strip --strip-unneeded "$SRC"
          file "$SRC"

          mkdir -p dist
          cp "$SRC" dist/libmediainfo.so.0
          sha256sum dist/libmediainfo.so.0 | tee dist/libmediainfo.so.0.sha256

      - name: Verify JNI symbols are gone
        run: |
          set -euo pipefail
          if nm -D --defined-only dist/libmediainfo.so.0 | grep -E "JNI_OnLoad|Java_Mediainfo|Java_MediaInfo" ; then
            echo "ERROR: JNI symbols still exported"
            exit 1
          fi
          echo "OK: no JNI symbols exported"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediainfo-linux-x86-64
          path: dist/*
          if-no-files-found: error
          retention-days: 5

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-2022
    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-zlib

      - name: Clone upstream sources
        shell: msys2 {0}
        env:
          MEDIAINFO_TAG: ${{ inputs.mediainfo_tag }}
          ZENLIB_TAG: ${{ inputs.zenlib_tag }}
        run: |
          set -euo pipefail
          BUILD_DIR="$(cygpath -u "$RUNNER_TEMP")/mediainfo-build"
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"
          git clone --depth=1 --branch "$ZENLIB_TAG" https://github.com/MediaArea/ZenLib
          git clone --depth=1 --branch "$MEDIAINFO_TAG" https://github.com/MediaArea/MediaInfoLib

      - name: Strip JNI bridge from MediaInfoLib source
        shell: msys2 {0}
        run: |
          set -euo pipefail
          BUILD_DIR="$(cygpath -u "$RUNNER_TEMP")/mediainfo-build"
          JNI_CPP="$BUILD_DIR/MediaInfoLib/Source/MediaInfoDLL/MediaInfoJNI.cpp"
          test -f "$JNI_CPP" || (echo "Expected JNI source not found: $JNI_CPP"; exit 1)
          : > "$JNI_CPP"
          test ! -s "$JNI_CPP"
          echo "Blanked: $JNI_CPP"

      - name: Build ZenLib (static)
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd "$(cygpath -u "$RUNNER_TEMP")/mediainfo-build/ZenLib/Project/GNU/Library"
          if [ -x ./autogen.sh ]; then ./autogen.sh; else autoreconf -fi; fi
          ./configure --enable-static --disable-shared
          # Three stacked problems on MinGW are fixed in this single sed. All three
          # showed up in turn during 2026-05-10 CI iteration; keeping the full
          # narrative here so future maintainers don't peel them again:
          #
          # (A) MinGW libtool refuses to absorb a static archive into a DLL.
          #     MediaInfoLib/configure.ac (v26.01 lines 471-473) appends
          #       $(libzen-config LIBS_Static)
          #     to LIBS verbatim, and ZenLib bakes that as ".../.libs/libzen.a -lpthread".
          #     libtool on MinGW has two stacked safety checks against the
          #     static-only ZenLib that both silently drop it:
          #       - bare .a path  -> "Trying to link with static lib archive ... the
          #         file extensions .a of this argument makes me believe that it is
          #         just a static archive that I should not use here."
          #       - .la wrapper, installed=yes, dlname='' -> "This system cannot link
          #         to static lib archive ... you do not appear to have a shared
          #         version."
          #
          # (B) Once libzen.a is back in the link line, GNU ld's strict left-to-
          #     right archive scan still mis-orders it: libtool emits LIBS at the
          #     very tail of the link command (`... -lstdc++ ... -lgcc_s ...
          #     crtend.o -O2 -Wl,libzen.a`), so when ld pulls Ztring.o out of
          #     libzen.a it has already moved past -lstdc++. ZenLib's wchar_t
          #     stream usage in Ztring.cpp (lines 1915, 1991, 2067 ...) then
          #     surfaces as hundreds of
          #       undefined reference to `std::__cxx11::basic_stringstream<wchar_t,
          #         std::char_traits<wchar_t>, std::allocator<wchar_t> >::~basic_stringstream()'
          #
          # (C) Same ordering problem repeats for every other library that ZenLib
          #     touches on Windows but the link line lists *before* libzen.a:
          #       - libkernel32 (`__imp_GetFileAttributesW`, `__imp_CreateFileW`,
          #         `__imp_FindFirstFileW`, `__imp_GetFileTime`, `__imp_CopyFileW`,
          #         `__imp_DeleteFileW`, `__imp_ResumeThread`, ... in Dir.cpp /
          #         File.cpp / FileName.cpp / Thread.cpp)
          #       - libmsvcrt (`_localtime64`, `_gmtime64`, `wcsncpy`,
          #         `__imp__beginthreadex` in Ztring.cpp / Thread.cpp)
          #       - libmingwex (`fmodf`, `fmod`, `fmodl` in int128u.cpp)
          #
          # Fix for (A)+(B)+(C) at once: rewrite the LIBS_Static path so libtool
          # sees a single `-Wl,*` token bundling libzen.a together with every
          # library it ever resolves against, all wrapped in a
          #   --start-group ... --end-group
          # pair. libtool's func_mode_link `-Wl,*)` branch splits on commas and
          # forwards each piece to ld unchanged, so:
          #   1. (A) is bypassed because libtool never sees libzen.a as a "library"
          #      to validate -- every comma-separated token is opaque to libtool
          #      (same trick OpenSSL / Qt / Boost use on MinGW).
          #   2. (B)+(C) are fixed because --start-group/--end-group makes ld
          #      re-scan the bundled libraries until all references resolve,
          #      regardless of where the bundle lands in the link line.
          #
          # The library list inside the group must cover *everything* ZenLib's
          # objects (Dir.o / File.o / Ztring.o / Thread.o / int128u.o / etc.)
          # could possibly need. Repeating libs that are already earlier in the
          # link line is harmless -- ld just resolves the same import-table entry
          # twice. -lpthread stays outside as ZenLib's normal -l* deplib too.
          #
          # Linux is unaffected: GNU ld there absorbs the bare .a regardless, but
          # the rewrite is also harmless there (ld accepts the same group syntax
          # identically). We only need this on mingw where (A)+(B)+(C) bite.
          sed -i 's|\([^"'\''[:space:]]*\.libs/libzen\.a\)|-Wl,--start-group,\1,-lstdc++,-lmingwex,-lmsvcrt,-lkernel32,-lgcc_s,-lgcc,-lpthread,--end-group|g' libzen-config
          make -j"$(nproc)"

      - name: Build MediaInfoLib (shared, no libcurl/libmms)
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd "$(cygpath -u "$RUNNER_TEMP")/mediainfo-build/MediaInfoLib/Project/GNU/Library"
          if [ -x ./autogen.sh ]; then ./autogen.sh; else autoreconf -fi; fi
          ./configure \
            --enable-shared \
            --enable-staticlibs \
            --without-libcurl \
            --without-libmms
          make -j"$(nproc)"

      - name: Verify ZenLib statically absorbed (pre-strip)
        shell: msys2 {0}
        run: |
          set -euo pipefail
          # Run on the unstripped artifact: --strip-unneeded later removes the COFF
          # symbol entries we use to detect the libtool regression below; only the
          # export table (.edata) and the import table survive stripping.
          LIBS_DIR="$(cygpath -u "$RUNNER_TEMP")/mediainfo-build/MediaInfoLib/Project/GNU/Library/.libs"
          SRC=""
          for cand in libmediainfo-0.dll libmediainfo.dll cygmediainfo-0.dll; do
            if [ -f "$LIBS_DIR/$cand" ]; then SRC="$LIBS_DIR/$cand"; break; fi
          done
          test -n "$SRC" || { echo "Build artifact missing under $LIBS_DIR"; ls -la "$LIBS_DIR" || true; exit 1; }

          # (1) Single-file artifact contract: no runtime dependency on libzen-*.dll.
          # If this fires, MinGW libtool fell back to the dynamic ZenLib branch and
          # we silently broke the lock contract.
          if objdump -p "$SRC" | grep -i 'DLL Name:' | grep -qi libzen ; then
            echo "ERROR: $(basename "$SRC") has external libzen DLL dependency"
            objdump -p "$SRC" | grep -i 'DLL Name:'
            exit 1
          fi

          # (2) Regression guard for the two-stacked libtool/ld bug we fixed via
          # the "-Wl,--start-group,...,libzen.a,-lstdc++,--end-group" patch on
          # libzen-config (see Build ZenLib step):
          #   - libtool no longer drops ZenLib (`-Wl,*` bypass), AND
          #   - ld no longer fails Ztring.o's wchar_t std::* refs (group re-scan).
          # If either ever regresses (upstream renames the bake-in path, libtool
          # gets stricter, sed pattern stops matching, ld changes group semantics)
          # the build either crashes here at link time or "succeeds" but produces
          # a DLL that fails at runtime. This nm check catches the silent variant.
          if ! nm -C --defined-only "$SRC" | grep -qE 'ZenLib::(Ztring|CriticalSection)' ; then
            echo "ERROR: ZenLib symbols not absorbed into $(basename "$SRC")"
            echo "----- ZenLib symbols seen by nm -C (defined or not): -----"
            nm -C "$SRC" | grep -E 'ZenLib::' | head -20 || true
            exit 1
          fi
          echo "OK: ZenLib statically absorbed; no external libzen-*.dll dependency"

      - name: Strip and stage binary
        shell: msys2 {0}
        run: |
          set -euo pipefail
          LIBS_DIR="$(cygpath -u "$RUNNER_TEMP")/mediainfo-build/MediaInfoLib/Project/GNU/Library/.libs"
          SRC=""
          for cand in libmediainfo-0.dll libmediainfo.dll cygmediainfo-0.dll; do
            if [ -f "$LIBS_DIR/$cand" ]; then SRC="$LIBS_DIR/$cand"; break; fi
          done
          if [ -z "$SRC" ]; then
            echo "Build artifact missing under $LIBS_DIR"
            ls -la "$LIBS_DIR" || true
            exit 1
          fi
          strip --strip-unneeded "$SRC"
          file "$SRC"

          DIST="$(cygpath -u "$GITHUB_WORKSPACE")/dist"
          mkdir -p "$DIST"
          cp "$SRC" "$DIST/MediaInfo.dll"
          sha256sum "$DIST/MediaInfo.dll" | tee "$DIST/MediaInfo.dll.sha256"

      - name: Verify JNI symbols are gone
        shell: msys2 {0}
        run: |
          set -euo pipefail
          DIST="$(cygpath -u "$GITHUB_WORKSPACE")/dist"
          if objdump -p "$DIST/MediaInfo.dll" | grep -E "JNI_OnLoad|Java_Mediainfo|Java_MediaInfo" ; then
            echo "ERROR: JNI symbols still exported"
            exit 1
          fi
          echo "OK: no JNI symbols exported"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediainfo-windows-x86-64
          path: dist/*
          if-no-files-found: error
          retention-days: 5

  publish:
    name: Publish Release
    runs-on: ubuntu-24.04
    needs: [build-linux, build-windows]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mediainfo-*
          merge-multiple: true
          path: dist

      - name: List staged files
        run: ls -la dist

      - name: Generate release body and lock rows
        env:
          MEDIAINFO_TAG: ${{ inputs.mediainfo_tag }}
          ZENLIB_TAG: ${{ inputs.zenlib_tag }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          test -f dist/libmediainfo.so.0
          test -f dist/MediaInfo.dll

          LINUX_SHA=$(sha256sum dist/libmediainfo.so.0 | awk '{print $1}')
          WIN_SHA=$(sha256sum dist/MediaInfo.dll | awk '{print $1}')
          URL_BASE="https://github.com/${REPO}/releases/download/${RELEASE_TAG}"

          # 4 列 TSV，TAB 分隔；用 printf 保证真实 TAB 字符
          {
            printf 'linux-x86-64\tlibmediainfo.so.0\t%s\t%s/libmediainfo.so.0\n' "$LINUX_SHA" "$URL_BASE"
            printf 'windows-x86-64\tMediaInfo.dll\t%s\t%s/MediaInfo.dll\n' "$WIN_SHA" "$URL_BASE"
          } > dist/lock-rows.tsv

          {
            echo "Self-built MediaInfo native binaries (no JNI bridge, no libcurl, no libmms)."
            echo
            echo "- Upstream MediaInfoLib: \`${MEDIAINFO_TAG}\`"
            echo "- Upstream ZenLib:       \`${ZENLIB_TAG}\`"
            echo "- Built at commit:       \`${COMMIT}\`"
            echo
            echo "## SHA-256"
            echo
            echo "| Platform | File | SHA-256 |"
            echo "| --- | --- | --- |"
            echo "| linux-x86-64 | libmediainfo.so.0 | \`${LINUX_SHA}\` |"
            echo "| windows-x86-64 | MediaInfo.dll | \`${WIN_SHA}\` |"
            echo
            echo "## Lock rows"
            echo
            echo "Paste these lines into \`gradle/mediainfo-binaries.lock\` (fields TAB-separated):"
            echo
            echo '```'
            cat dist/lock-rows.tsv
            echo '```'
            echo
            echo "## License"
            echo
            echo "Both MediaInfoLib and ZenLib are BSD-2-Clause."
            echo "- MediaInfoLib: https://github.com/MediaArea/MediaInfoLib/blob/${MEDIAINFO_TAG}/License.html"
            echo "- ZenLib:       https://github.com/MediaArea/ZenLib/blob/${ZENLIB_TAG}/License.txt"
          } > release-body.md

          echo "----- release-body.md -----"
          cat release-body.md
          echo "----- lock-rows.tsv -----"
          cat dist/lock-rows.tsv | od -c | head -20

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: MediaInfo Binaries ${{ inputs.release_tag }}
          body_path: release-body.md
          prerelease: false
          make_latest: false
          overwrite_files: true
          files: |
            dist/libmediainfo.so.0
            dist/MediaInfo.dll
            dist/lock-rows.tsv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
